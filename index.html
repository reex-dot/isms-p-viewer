<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보보호관리체계</title>
<style>
  .tab-bar{display:flex;background:white;border-bottom:2px solid var(--purple);padding:0 20px;box-shadow:0 2px 4px rgba(0,0,0,.06);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-bar a{display:flex;align-items:center;gap:6px;padding:11px 18px;font-size:13px;font-weight:600;color:var(--text-light);text-decoration:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s;white-space:nowrap;}
  .tab-bar a:hover{color:var(--purple);}
  .tab-bar a.active{color:var(--purple);border-bottom-color:var(--purple);}
  /* 가로 모드 폰 포함 (640~812px) */
  @media (max-width: 812px) {
    .tab-bar { padding: 0 6px; }
    .tab-bar a { padding: 9px 10px; font-size: 12px; gap: 3px; }
  }
</style>
<style>
  :root {
    --purple: #6c478d;
    --purple-light: #8b5cad;
    --purple-pale: #f4f0f8;
    --purple-hover: #e8dff4;
    --gray-bg: #f5f6f8;
    --sidebar-w: 320px;
    --border: #ddd;
    --text: #333;
    --text-light: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 헤더 ── */
  header {
    background: var(--purple);
    color: white;
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
    z-index: 100;
  }
  header .logo {
    background: white;
    color: var(--purple);
    font-weight: 900;
    font-size: 13px;
    padding: 4px 8px;
    border-radius: 4px;
    letter-spacing: -0.5px;
  }
  header h1 { font-size: 16px; font-weight: 600; flex: 1; }
  header .search-wrap { display: flex; align-items: center; gap: 8px; }
  #search {
    padding: 6px 12px;
    border-radius: 20px;
    border: none;
    width: 220px;
    font-size: 13px;
    outline: none;
  }
  #search-clear {
    background: rgba(255,255,255,.2);
    border: none;
    color: white;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    display: none;
  }

  /* ── 본문 레이아웃 ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 사이드바 ── */
  aside {
    width: var(--sidebar-w);
    background: white;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-light);
    background: var(--gray-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-scroll { overflow-y: auto; flex: 1; }

  /* 영역 */
  .zone-block { border-bottom: 2px solid var(--purple); }
  .zone-title {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--purple);
    color: white;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
  }
  .zone-title .zone-badge {
    background: rgba(255,255,255,.25);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 500;
  }
  .zone-title .chevron { margin-left: auto; transition: transform .2s; font-size: 10px; }
  .zone-title.collapsed .chevron { transform: rotate(-90deg); }

  /* 분야 */
  .field-block {}
  .field-title {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px 8px 20px;
    background: var(--purple-pale);
    border-bottom: 1px solid #e0d9ec;
    font-size: 12px;
    font-weight: 600;
    color: var(--purple);
    cursor: pointer;
    user-select: none;
  }
  .field-title .field-id {
    background: var(--purple);
    color: white;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .field-title .chevron { margin-left: auto; transition: transform .2s; font-size: 10px; color: var(--purple); }
  .field-title.collapsed .chevron { transform: rotate(-90deg); }

  /* 항목 */
  .item-list { display: flex; flex-direction: column; }
  .item-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px 8px 28px;
    border: none;
    background: white;
    text-align: left;
    cursor: pointer;
    font-size: 12.5px;
    color: var(--text);
    border-bottom: 1px solid #f0f0f0;
    transition: background .15s;
    width: 100%;
  }
  .item-btn:hover { background: var(--purple-hover); }
  .item-btn.active { background: var(--purple-hover); border-left: 3px solid var(--purple); padding-left: 25px; font-weight: 600; color: var(--purple); }
  .item-btn.hidden { display: none; }
  .item-btn .item-id {
    color: var(--purple-light);
    font-weight: 700;
    font-size: 11.5px;
    flex-shrink: 0;
    min-width: 38px;
  }

  /* ── 컨텐츠 영역 ── */
  main {
    flex: 1;
    overflow-y: auto;
    background: var(--gray-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px;
  }

  /* 환영 화면 */
  .welcome {
    max-width: 600px;
    text-align: center;
    margin-top: 60px;
  }
  .welcome .logo-big {
    width: 100px;
    height: 100px;
    background: var(--purple);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 28px;
    font-weight: 900;
    margin: 0 auto 24px;
    letter-spacing: -2px;
  }
  .welcome h2 { font-size: 22px; color: var(--purple); margin-bottom: 12px; }
  .welcome p { color: var(--text-light); font-size: 14px; line-height: 1.7; }
  .stats { display: flex; gap: 20px; justify-content: center; margin-top: 28px; }
  .stat-box {
    background: white;
    border-radius: 12px;
    padding: 16px 24px;
    border: 1px solid var(--border);
    text-align: center;
  }
  .stat-box .num { font-size: 28px; font-weight: 800; color: var(--purple); }
  .stat-box .label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

  /* 항목 상세 뷰 */
  .item-view { width: 100%; max-width: 960px; }

  .item-header {
    background: white;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .item-header .badge {
    background: var(--purple);
    color: white;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 18px;
    font-weight: 800;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .item-header .title-area h2 { font-size: 20px; color: var(--text); }
  .item-header .title-area .field-label {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
  }
  .nav-btns { margin-left: auto; display: flex; gap: 8px; }
  .nav-btn {
    background: var(--purple-pale);
    border: 1px solid #c9b8e0;
    color: var(--purple);
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: background .15s;
  }
  .nav-btn:hover { background: var(--purple-hover); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* 페이지 이미지 */
  .page-container {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .page-img {
    width: 100%;
    display: block;
  }
  .page-label {
    padding: 6px 16px;
    background: var(--gray-bg);
    font-size: 11px;
    color: var(--text-light);
    border-top: 1px solid var(--border);
    text-align: right;
  }

  /* 검색 결과 없음 */
  .no-result {
    padding: 20px;
    text-align: center;
    color: var(--text-light);
    font-size: 13px;
  }

  /* ── 형광펜 ── */
  .page-container { position: relative; }
  .hl-canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; touch-action: none;
  }
  .hl-canvas.active { /* pointer-events 는 항상 none 유지 — container에서 이벤트 처리 */ }

  .hl-toolbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: white; border-radius: 10px; padding: 10px 14px;
    margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    position: sticky; top: 0; z-index: 10;
  }
  .hl-toolbar-label { font-size: 12px; color: var(--text-light); margin-right: 2px; }
  .hl-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border);
    background: white; font-size: 13px; font-weight: 600; color: var(--text-light);
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .hl-toggle.on { background: var(--purple); border-color: var(--purple); color: white; }
  .hl-colors { display: flex; gap: 6px; align-items: center; }
  .hl-color {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; transition: transform .15s;
  }
  .hl-color:hover { transform: scale(1.15); }
  .hl-color.sel { border-color: #444; transform: scale(1.2); }
  .hl-sep { width: 1px; height: 22px; background: var(--border); margin: 0 2px; }
  .hl-action {
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: white; font-size: 12px; color: var(--text-light); cursor: pointer;
    transition: all .15s;
  }
  .hl-action:hover { border-color: var(--purple-light); color: var(--purple); }

  /* ── 책갈피 ── */
  .bm-star-btn {
    background: none; border: 2px solid var(--border);
    border-radius: 8px; padding: 7px 12px; cursor: pointer;
    font-size: 16px; color: #ccc; transition: all .15s; line-height: 1;
    font-family: inherit;
  }
  .bm-star-btn.on { color: #f5a623; border-color: #f5a623; background: #fffbf0; }
  .bm-star-btn:hover { border-color: #f5a623; color: #f5a623; }

  .bm-filter-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 2px 8px; cursor: pointer; font-size: 11px; color: var(--text-light);
    transition: all .15s; white-space: nowrap; font-family: inherit; line-height: 1.6;
  }
  .bm-filter-btn.on { background: #fff3d4; border-color: #f5a623; color: #c67c00; font-weight: 700; }
  .bm-filter-btn:hover { border-color: #f5a623; color: #c67c00; }

  .item-btn .bm-dot { color: #f5a623; font-size: 11px; margin-left: auto; flex-shrink: 0; }

  /* 햄버거 버튼 (모바일 전용) */
  #sidebar-toggle {
    display: none;
    background: rgba(255,255,255,.2);
    border: none;
    color: white;
    font-size: 20px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    line-height: 1;
    flex-shrink: 0;
  }

  /* 모바일 사이드바 오버레이 배경 */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 150;
  }

  /* ── 모바일 반응형 ── */
  @media (max-width: 640px) {
    #sidebar-toggle { display: block; }

    header h1 { font-size: 13px; }
    header { padding: 0 10px; gap: 8px; height: 50px; }
    #search { width: 140px; font-size: 12px; padding: 5px 10px; }
    #search-clear { font-size: 11px; padding: 3px 8px; }

    .tab-bar { overflow-x: auto; padding: 0 10px; }
    .tab-bar a { padding: 9px 10px; font-size: 12px; gap: 3px; }

    /* 사이드바: 기본 숨김 → 슬라이드 오버레이 */
    aside {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 290px;
      z-index: 200;
      transform: translateX(-100%);
      transition: transform .25s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,.2);
    }
    aside.open { transform: translateX(0); }
    #sidebar-overlay.open { display: block; }

    /* main 전체 너비 */
    .layout { overflow: visible; }
    main { padding: 14px 12px; overflow-y: auto; }

    .item-header { padding: 14px 14px; gap: 10px; flex-wrap: wrap; }
    .item-header .badge { font-size: 15px; padding: 6px 10px; }
    .item-header .title-area h2 { font-size: 16px; }
    .nav-btns { margin-left: 0; width: 100%; justify-content: flex-end; }
    .nav-btn { padding: 8px 14px; font-size: 13px; }

    .welcome { margin-top: 24px; }
    .welcome h2 { font-size: 18px; }
    .stats { gap: 12px; }
    .stat-box { padding: 12px 16px; }
    .stat-box .num { font-size: 24px; }
  }
</style>
</head>
<body>

<header>
  <button id="sidebar-toggle" onclick="toggleSidebar()" aria-label="메뉴">☰</button>
  <div class="logo">ISMS-P</div>
  <h1>정보보호관리체계</h1>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="항목 검색...">
    <button id="search-clear" onclick="clearSearch()">✕</button>
  </div>
</header>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<nav class="tab-bar">
  <a href="index.html" class="active">📋 인증기준 안내서</a>
  <a href="amgi_page.html">📝 주요 암기사항</a>
  <a href="puri_page.html">💡 인증 기준 풀이</a>
  <a href="quiz_page.html">📚 문제풀이</a>
</nav>

<div class="layout">
  <aside>
    <div class="sidebar-header">
      <span>인증기준 목록</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="bm-filter-btn" id="bm-filter-btn" onclick="toggleBmFilter()" title="책갈피만 보기">★ 책갈피</button>
        <span id="item-count">101개 항목</span>
      </div>
    </div>
    <div class="sidebar-scroll" id="sidebar-scroll">
      <!-- JS로 생성 -->
    </div>
  </aside>

  <main id="main">
    <div class="welcome" id="welcome">
      <div class="logo-big">IS<br>MS-P</div>
      <h2>ISMS-P 인증기준 안내서</h2>
      <p>정보보호 및 개인정보보호 관리체계(ISMS-P) 인증기준 안내서입니다.<br>
      왼쪽 트리에서 항목을 선택하면 해당 인증기준의 세부 내용을 확인할 수 있습니다.</p>
      <div class="stats">
        <div class="stat-box"><div class="num">3</div><div class="label">영역</div></div>
        <div class="stat-box"><div class="num">21</div><div class="label">분야</div></div>
        <div class="stat-box"><div class="num">101</div><div class="label">인증기준 항목</div></div>
      </div>
    </div>
    <div class="item-view" id="item-view" style="display:none"></div>
  </main>
</div>

<script src="data.js"></script>
<script>
let currentItemId = null;
let searchTimer = null;

function toggleSidebar() {
  const aside = document.querySelector('aside');
  const overlay = document.getElementById('sidebar-overlay');
  const isOpen = aside.classList.contains('open');
  aside.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
}

// ── 사이드바 렌더링 ──────────────────────────────
function buildSidebar() {
  const scroll = document.getElementById('sidebar-scroll');
  const { zones, fields, items } = ISMS_DATA;

  // 영역별 그룹화
  const zoneGroups = {};
  for (const item of items) {
    if (!zoneGroups[item.zone]) zoneGroups[item.zone] = {};
    if (!zoneGroups[item.zone][item.field]) zoneGroups[item.zone][item.field] = [];
    zoneGroups[item.zone][item.field].push(item);
  }

  let html = '';
  for (const [zoneId, zoneInfo] of Object.entries(zones)) {
    const z = parseInt(zoneId);
    html += `<div class="zone-block" id="zone-${z}">
      <div class="zone-title" onclick="toggleZone(${z})">
        <span>${z}.</span>
        <span>${zoneInfo.name}</span>
        <span class="zone-badge">${zoneInfo.count}개</span>
        <span class="chevron">▼</span>
      </div>
      <div class="zone-content" id="zone-content-${z}">`;

    for (const [fieldId, fieldName] of Object.entries(fields)) {
      if (!fieldId.startsWith(z + '.')) continue;
      const fieldItems = zoneGroups[z] && zoneGroups[z][fieldId] ? zoneGroups[z][fieldId] : [];
      if (!fieldItems.length) continue;

      html += `<div class="field-block" id="field-${fieldId.replace('.', '-')}">
        <div class="field-title" onclick="toggleField('${fieldId}')">
          <span class="field-id">${fieldId}</span>
          <span>${fieldName}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="item-list" id="field-items-${fieldId.replace('.', '-')}">`;

      for (const item of fieldItems) {
        html += `<button class="item-btn" id="item-btn-${item.id.replace(/\./g, '-')}"
          onclick="showItem('${item.id}')" data-id="${item.id}" data-name="${item.name}">
          <span class="item-id">${item.id}</span>
          <span class="item-name">${item.name}</span>
        </button>`;
      }
      html += `</div></div>`;
    }
    html += `</div></div>`;
  }
  scroll.innerHTML = html;
}

// ── 영역/분야 토글 ──────────────────────────────
function toggleZone(z) {
  const content = document.getElementById(`zone-content-${z}`);
  const title = content.previousElementSibling;
  const isCollapsed = title.classList.contains('collapsed');
  title.classList.toggle('collapsed', !isCollapsed);
  content.style.display = isCollapsed ? '' : 'none';
}

function toggleField(fieldId) {
  const key = fieldId.replace('.', '-');
  const content = document.getElementById(`field-items-${key}`);
  const title = content.previousElementSibling;
  const isCollapsed = title.classList.contains('collapsed');
  title.classList.toggle('collapsed', !isCollapsed);
  content.style.display = isCollapsed ? '' : 'none';
}

// ── 항목 표시 ──────────────────────────────────
function showItem(itemId) {
  const { items, fields } = ISMS_DATA;
  const item = items.find(x => x.id === itemId);
  if (!item) return;

  currentItemId = itemId;

  // 모바일: 사이드바 닫기
  if (window.innerWidth <= 640) {
    document.querySelector('aside').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }

  // 사이드바 활성화
  document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`item-btn-${itemId.replace(/\./g, '-')}`);
  if (btn) {
    btn.classList.add('active');
    btn.scrollIntoView({ block: 'nearest' });
  }

  // 이전/다음
  const idx = items.findIndex(x => x.id === itemId);
  const prev = idx > 0 ? items[idx - 1] : null;
  const next = idx < items.length - 1 ? items[idx + 1] : null;

  const fieldName = fields[item.field] || '';

  // 페이지 이미지
  let pagesHtml = '';
  for (const p of item.pages) {
    pagesHtml += `<div class="page-container">
      <img class="page-img" src="pages/p${String(p).padStart(3,'0')}.jpg" alt="페이지 ${p}" loading="lazy">
      <div class="page-label">p.${p}</div>
    </div>`;
  }

  const view = document.getElementById('item-view');
  view.innerHTML = `
    <div class="item-header">
      <div class="badge">${item.id}</div>
      <div class="title-area">
        <h2>${item.name}</h2>
        <div class="field-label">${item.field} ${fieldName}</div>
      </div>
      <div class="nav-btns">
        <button id="bm-star-btn" class="bm-star-btn ${bookmarks.has(itemId) ? 'on' : ''}"
          onclick="toggleBookmark('${itemId}')"
          title="${bookmarks.has(itemId) ? '책갈피 해제' : '책갈피 추가'}">${bookmarks.has(itemId) ? '★' : '☆'}</button>
        <button class="nav-btn" onclick="showItem('${prev ? prev.id : ''}')" ${!prev ? 'disabled' : ''}>◀ 이전</button>
        <button class="nav-btn" onclick="showItem('${next ? next.id : ''}')" ${!next ? 'disabled' : ''}>다음 ▶</button>
      </div>
    </div>
    ${pagesHtml}`;

  document.getElementById('welcome').style.display = 'none';
  view.style.display = 'block';
  document.getElementById('main').scrollTo(0, 0);
}

// ── 검색 ──────────────────────────────────────
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(this.value.trim()), 150);
});

function doSearch(q) {
  const clear = document.getElementById('search-clear');
  const count = document.getElementById('item-count');
  const { items, fields } = ISMS_DATA;
  clear.style.display = q ? 'block' : 'none';

  if (!q) {
    document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('hidden'));
    document.querySelectorAll('.field-block, .zone-block').forEach(b => b.style.display = '');
    count.textContent = '101개 항목';
    return;
  }

  const qLower = q.toLowerCase();
  let visible = 0;

  for (const item of items) {
    const match = item.id.includes(q) || item.name.includes(q) ||
      (fields[item.field] || '').includes(q);
    const btn = document.getElementById(`item-btn-${item.id.replace(/\./g, '-')}`);
    if (btn) btn.classList.toggle('hidden', !match);
    if (match) visible++;
  }

  // 분야/영역 숨김 처리
  document.querySelectorAll('.field-block').forEach(fb => {
    const hasVisible = [...fb.querySelectorAll('.item-btn')].some(b => !b.classList.contains('hidden'));
    fb.style.display = hasVisible ? '' : 'none';
    if (hasVisible) {
      const content = fb.querySelector('.item-list');
      const title = fb.querySelector('.field-title');
      if (content) content.style.display = '';
      if (title) title.classList.remove('collapsed');
    }
  });

  document.querySelectorAll('.zone-block').forEach(zb => {
    const hasVisible = [...zb.querySelectorAll('.item-btn')].some(b => !b.classList.contains('hidden'));
    zb.style.display = hasVisible ? '' : 'none';
    if (hasVisible) {
      const content = zb.querySelector('.zone-content');
      const title = zb.querySelector('.zone-title');
      if (content) content.style.display = '';
      if (title) title.classList.remove('collapsed');
    }
  });

  count.textContent = `${visible}개 항목`;
}

function clearSearch() {
  document.getElementById('search').value = '';
  doSearch('');
}

// ── 키보드 단축키 ──────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (!currentItemId) return;
  const { items } = ISMS_DATA;
  const idx = items.findIndex(x => x.id === currentItemId);
  if (e.key === 'ArrowLeft' && idx > 0) showItem(items[idx-1].id);
  if (e.key === 'ArrowRight' && idx < items.length-1) showItem(items[idx+1].id);
});

// ── 초기화 ─────────────────────────────────────
buildSidebar();

// ══════════════════════════════════════════════
// 책갈피 시스템
// ══════════════════════════════════════════════
const BM_KEY = 'isms_bookmarks_v1';
let bookmarks = new Set();
let bmFilterOn = false;

try { bookmarks = new Set(JSON.parse(localStorage.getItem(BM_KEY) || '[]')); } catch(e) {}

function saveBm() {
  try { localStorage.setItem(BM_KEY, JSON.stringify([...bookmarks])); } catch(e) {}
}

function toggleBookmark(itemId) {
  if (bookmarks.has(itemId)) bookmarks.delete(itemId);
  else bookmarks.add(itemId);
  saveBm();
  // 헤더 별 버튼 업데이트
  const starBtn = document.getElementById('bm-star-btn');
  if (starBtn) {
    const on = bookmarks.has(itemId);
    starBtn.classList.toggle('on', on);
    starBtn.textContent = on ? '★' : '☆';
    starBtn.title = on ? '책갈피 해제' : '책갈피 추가';
  }
  updateSidebarBmIcon(itemId);
  if (bmFilterOn) applyBmFilter();
}

function updateSidebarBmIcon(itemId) {
  const btn = document.getElementById('item-btn-' + itemId.replace(/\./g, '-'));
  if (!btn) return;
  let dot = btn.querySelector('.bm-dot');
  if (bookmarks.has(itemId)) {
    if (!dot) { dot = document.createElement('span'); dot.className = 'bm-dot'; dot.textContent = '★'; btn.appendChild(dot); }
  } else {
    if (dot) dot.remove();
  }
}

function initSidebarBmIcons() { bookmarks.forEach(id => updateSidebarBmIcon(id)); }

function toggleBmFilter() {
  bmFilterOn = !bmFilterOn;
  const btn = document.getElementById('bm-filter-btn');
  if (btn) btn.classList.toggle('on', bmFilterOn);
  applyBmFilter();
}

function applyBmFilter() {
  const { items } = ISMS_DATA;
  if (!bmFilterOn) {
    // 모든 item-btn style 복원 후 검색 재적용
    document.querySelectorAll('.item-btn').forEach(b => b.style.display = '');
    document.querySelectorAll('.field-block, .zone-block').forEach(b => b.style.display = '');
    const q = document.getElementById('search').value.trim();
    if (q) doSearch(q);
    else document.getElementById('item-count').textContent = '101개 항목';
    return;
  }
  let count = 0;
  for (const item of items) {
    const btn = document.getElementById('item-btn-' + item.id.replace(/\./g, '-'));
    if (!btn) continue;
    const show = bookmarks.has(item.id);
    btn.style.display = show ? '' : 'none';
    if (show) count++;
  }
  document.querySelectorAll('.field-block').forEach(fb => {
    const hasVisible = [...fb.querySelectorAll('.item-btn')].some(b => b.style.display !== 'none');
    fb.style.display = hasVisible ? '' : 'none';
    if (hasVisible) {
      const c = fb.querySelector('.item-list'), t = fb.querySelector('.field-title');
      if (c) c.style.display = ''; if (t) t.classList.remove('collapsed');
    }
  });
  document.querySelectorAll('.zone-block').forEach(zb => {
    const hasVisible = [...zb.querySelectorAll('.item-btn')].some(b => b.style.display !== 'none');
    zb.style.display = hasVisible ? '' : 'none';
    if (hasVisible) {
      const c = zb.querySelector('.zone-content'), t = zb.querySelector('.zone-title');
      if (c) c.style.display = ''; if (t) t.classList.remove('collapsed');
    }
  });
  document.getElementById('item-count').textContent = count ? `★ ${count}개 항목` : '책갈피 없음';
}

// 초기 사이드바 별 아이콘 표시
initSidebarBmIcons();

// ══════════════════════════════════════════════
// 형광펜 시스템
// ══════════════════════════════════════════════
const HL_KEY = 'isms_highlights_v1';
let hlData = {};       // pageNum(str) -> [{x,y,w,h,color}]  (relative 0~1)
let hlMode = false;
let hlColor = 'rgba(255,230,0,0.38)';
const HL_COLORS = [
  { val: 'rgba(255,230,0,0.38)',  css: '#ffe600', label: '노랑' },
  { val: 'rgba(100,220,100,0.38)',css: '#64dc64', label: '초록' },
  { val: 'rgba(255,100,180,0.38)',css: '#ff64b4', label: '분홍' },
  { val: 'rgba(80,160,255,0.38)', css: '#50a0ff', label: '파랑' },
];

try { hlData = JSON.parse(localStorage.getItem(HL_KEY) || '{}'); } catch(e) {}

function saveHl() {
  try { localStorage.setItem(HL_KEY, JSON.stringify(hlData)); } catch(e) {}
}

function redraw(canvas, pageNum) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  (hlData[pageNum] || []).forEach(r => {
    ctx.fillStyle = r.color;
    ctx.fillRect(r.x * canvas.width, r.y * canvas.height,
                 r.w * canvas.width, r.h * canvas.height);
  });
}

function syncSize(canvas, img) {
  const w = img.offsetWidth, h = img.offsetHeight;
  if (w && h && (canvas.width !== w || canvas.height !== h)) {
    canvas.width = w; canvas.height = h;
  }
}

function initCanvas(container, pageNum) {
  const img = container.querySelector('.page-img');
  const canvas = document.createElement('canvas');
  canvas.className = 'hl-canvas';
  container.appendChild(canvas);

  function setup() { syncSize(canvas, img); redraw(canvas, pageNum); }
  if (img.complete && img.offsetWidth) setup();
  else img.addEventListener('load', setup);
  new ResizeObserver(() => { syncSize(canvas, img); redraw(canvas, pageNum); }).observe(container);

  let drawing = false, sx = 0, sy = 0;

  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) / r.width, y: (t.clientY - r.top) / r.height };
  }

  function onStart(e) {
    if (!hlMode) return;
    e.preventDefault();
    syncSize(canvas, img);
    drawing = true;
    const p = pos(e); sx = p.x; sy = p.y;
  }
  function onMove(e) {
    if (!hlMode || !drawing) return;
    e.preventDefault();
    const p = pos(e);
    syncSize(canvas, img);
    redraw(canvas, pageNum);
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = hlColor;
    ctx.fillRect(Math.min(sx,p.x)*canvas.width, Math.min(sy,p.y)*canvas.height,
                 Math.abs(p.x-sx)*canvas.width, Math.abs(p.y-sy)*canvas.height);
  }
  function onEnd(e) {
    if (!hlMode || !drawing) return;
    drawing = false;
    const t = e.changedTouches ? e.changedTouches[0] : e;
    const r = canvas.getBoundingClientRect();
    const ex = (t.clientX - r.left) / r.width;
    const ey = (t.clientY - r.top) / r.height;
    const rect = { x: Math.min(sx,ex), y: Math.min(sy,ey),
                   w: Math.abs(ex-sx), h: Math.abs(ey-sy), color: hlColor };
    if (rect.w > 0.005 && rect.h > 0.003) {
      if (!hlData[pageNum]) hlData[pageNum] = [];
      hlData[pageNum].push(rect);
      saveHl();
    }
    redraw(canvas, pageNum);
  }

  canvas.addEventListener('mousedown', onStart);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onEnd);
  canvas.addEventListener('touchstart', onStart, { passive: false });
  canvas.addEventListener('touchmove',  onMove,  { passive: false });
  canvas.addEventListener('touchend',   onEnd);
}

function buildHlToolbar(itemId) {
  const bar = document.createElement('div');
  bar.className = 'hl-toolbar';
  bar.id = 'hl-toolbar';

  // 토글 버튼
  const toggle = document.createElement('button');
  toggle.className = 'hl-toggle' + (hlMode ? ' on' : '');
  toggle.innerHTML = '🖊 형광펜';
  toggle.onclick = () => {
    hlMode = !hlMode;
    toggle.classList.toggle('on', hlMode);
    toggle.innerHTML = hlMode ? '✏️ ON · 꾹 눌러 그리기' : '🖊 형광펜';
    document.querySelectorAll('.hl-canvas').forEach(c => c.classList.toggle('active', hlMode));
  };
  bar.appendChild(toggle);

  // 색상 선택
  const colorWrap = document.createElement('div');
  colorWrap.className = 'hl-colors';
  HL_COLORS.forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'hl-color' + (c.val === hlColor ? ' sel' : '');
    btn.style.background = c.css;
    btn.title = c.label;
    btn.onclick = () => {
      hlColor = c.val;
      colorWrap.querySelectorAll('.hl-color').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
    };
    colorWrap.appendChild(btn);
  });
  bar.appendChild(colorWrap);

  bar.appendChild(Object.assign(document.createElement('div'), { className: 'hl-sep' }));

  // 실행취소
  const undo = document.createElement('button');
  undo.className = 'hl-action'; undo.textContent = '↩ 실행취소';
  undo.onclick = () => {
    // 현재 보이는 페이지들에서 마지막 하이라이트 제거
    const pages = [...document.querySelectorAll('.hl-canvas')];
    for (let i = pages.length - 1; i >= 0; i--) {
      const pn = pages[i].dataset.page;
      if (hlData[pn] && hlData[pn].length) {
        hlData[pn].pop();
        saveHl();
        redraw(pages[i], pn);
        break;
      }
    }
  };
  bar.appendChild(undo);

  // 현재 항목 전체 지우기
  const clearBtn = document.createElement('button');
  clearBtn.className = 'hl-action'; clearBtn.textContent = '🗑 이 항목 지우기';
  clearBtn.onclick = () => {
    if (!confirm('이 항목의 형광펜을 모두 지울까요?')) return;
    document.querySelectorAll('.hl-canvas').forEach(c => {
      const pn = c.dataset.page;
      delete hlData[pn];
      saveHl();
      redraw(c, pn);
    });
  };
  bar.appendChild(clearBtn);

  return bar;
}

// showItem 후처리: 형광펜 초기화
const _origShowItem = showItem;
showItem = function(itemId) {
  _origShowItem(itemId);
  // 잠깐 후 DOM이 생성된 뒤에 캔버스 초기화
  requestAnimationFrame(() => {
    // 툴바 삽입
    const view = document.getElementById('item-view');
    const existingBar = document.getElementById('hl-toolbar');
    if (!existingBar) view.insertBefore(buildHlToolbar(itemId), view.firstChild);

    // 각 페이지 캔버스 초기화
    document.querySelectorAll('.page-container').forEach(container => {
      if (container.querySelector('.hl-canvas')) return; // 이미 있으면 스킵
      const label = container.querySelector('.page-label');
      const pageNum = label ? label.textContent.replace(/[^0-9]/g,'') : '0';
      const canvas = container.appendChild(document.createElement('canvas'));
      canvas.className = 'hl-canvas' + (hlMode ? ' active' : '');
      canvas.dataset.page = pageNum;

      const img = container.querySelector('.page-img');
      function setup() {
        syncSize(canvas, img);
        redraw(canvas, pageNum);
      }
      if (img.complete && img.offsetWidth) setup();
      else img.addEventListener('load', setup);
      new ResizeObserver(() => { syncSize(canvas, img); redraw(canvas, pageNum); }).observe(container);

      let drawing = false, sx = 0, sy = 0;
      let pressTimer = null, pressPos = null;
      let activeMoveHandler = null; // 그릴 때만 동적으로 붙이는 move 리스너

      function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : e);
        return { x: (t.clientX - r.left) / r.width, y: (t.clientY - r.top) / r.height };
      }
      function drawPreview(p) {
        syncSize(canvas, img); redraw(canvas, pageNum);
        const ctx = canvas.getContext('2d'); ctx.fillStyle = hlColor;
        ctx.fillRect(Math.min(sx,p.x)*canvas.width, Math.min(sy,p.y)*canvas.height,
                     Math.abs(p.x-sx)*canvas.width, Math.abs(p.y-sy)*canvas.height);
      }
      function commitRect(ex, ey) {
        const rect = { x:Math.min(sx,ex), y:Math.min(sy,ey),
                       w:Math.abs(ex-sx), h:Math.abs(ey-sy), color:hlColor };
        if (rect.w > 0.005 && rect.h > 0.003) {
          if (!hlData[pageNum]) hlData[pageNum] = [];
          hlData[pageNum].push(rect); saveHl();
        }
        redraw(canvas, pageNum);
      }
      function endDraw(ex, ey) {
        // ex/ey가 null이면 그냥 취소
        drawing = false; container.style.cursor = '';
        if (activeMoveHandler) {
          document.removeEventListener('touchmove', activeMoveHandler);
          document.removeEventListener('mousemove', activeMoveHandler);
          activeMoveHandler = null;
        }
        if (ex !== null) commitRect(ex, ey); else redraw(canvas, pageNum);
      }
      function beginDraw(p) {
        syncSize(canvas, img); drawing = true; sx = p.x; sy = p.y;
        container.style.cursor = 'crosshair';
        if (navigator.vibrate) navigator.vibrate(40);
        // non-passive move 리스너를 그릴 때만 동적 등록 → 평소엔 스크롤 완전 보장
        activeMoveHandler = function(e) {
          if (!drawing) return;
          if (e.touches && e.touches.length > 1) { endDraw(null, null); return; }
          e.preventDefault();
          drawPreview(getPos(e));
        };
        document.addEventListener('touchmove', activeMoveHandler, { passive: false });
        document.addEventListener('mousemove', activeMoveHandler);
      }

      // ── 모바일/PC 공통: 꾹 누르기(long press) → 드래그 ──
      // touchstart/mousedown 은 passive → 스크롤에 간섭 없음
      container.addEventListener('touchstart', function(e) {
        if (!hlMode || e.touches.length > 1) return;
        const p = getPos(e); pressPos = p;
        pressTimer = setTimeout(() => { pressTimer = null; beginDraw(p); }, 500);
      }, { passive: true });

      container.addEventListener('touchmove', function(e) {
        // 꾹 누르기 대기 중에 손가락이 많이 움직이면 스크롤로 판단, 타이머 취소
        if (!pressTimer) return;
        const p = getPos(e);
        if (Math.abs(p.x - pressPos.x) > 0.04 || Math.abs(p.y - pressPos.y) > 0.04) {
          clearTimeout(pressTimer); pressTimer = null;
        }
      }, { passive: true }); // passive → 스크롤 간섭 없음

      container.addEventListener('touchend', function(e) {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (!drawing) return;
        const t = e.changedTouches[0]; const r2 = canvas.getBoundingClientRect();
        endDraw((t.clientX - r2.left) / r2.width, (t.clientY - r2.top) / r2.height);
      });
      container.addEventListener('touchcancel', function() {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (drawing) endDraw(null, null);
      });

      container.addEventListener('mousedown', function(e) {
        if (!hlMode || e.button !== 0) return;
        const p = getPos(e); pressPos = p;
        pressTimer = setTimeout(() => { pressTimer = null; beginDraw(p); }, 400);
      });
      container.addEventListener('mousemove', function(e) {
        if (!pressTimer) return;
        const p = getPos(e);
        if (Math.abs(p.x - pressPos.x) > 0.02 || Math.abs(p.y - pressPos.y) > 0.02) {
          clearTimeout(pressTimer); pressTimer = null;
        }
      });
      container.addEventListener('mouseup', function(e) {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (!drawing) return;
        const p = getPos(e); endDraw(p.x, p.y);
      });
    });
  });
};
</script>
