<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문제풀이 - ISMS-P</title>
<style>
:root{
  --purple:#6c478d;--purple-light:#8b5cad;--purple-pale:#f4f0f8;
  --purple-hover:#e8dff4;--gray-bg:#f5f6f8;--border:#ddd;--text:#333;--text-light:#666;
  --green:#2e7d32;--red:#c62828;--green-pale:#e8f5e9;--red-pale:#ffebee;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:var(--gray-bg);color:var(--text);min-height:100vh;}
header{background:var(--purple);color:white;padding:0 20px;height:56px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.25);position:sticky;top:0;z-index:100;}
header .logo{background:white;color:var(--purple);font-weight:900;font-size:13px;padding:4px 8px;border-radius:4px;letter-spacing:-0.5px;white-space:nowrap;}
header h1{font-size:16px;font-weight:600;flex:1;}
.tab-bar{display:flex;background:white;border-bottom:2px solid var(--purple);padding:0 20px;position:sticky;top:56px;z-index:99;box-shadow:0 2px 4px rgba(0,0,0,.06);overflow-x:auto;}
.tab-bar a{display:flex;align-items:center;gap:6px;padding:11px 18px;font-size:13px;font-weight:600;color:var(--text-light);text-decoration:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s;white-space:nowrap;}
.tab-bar a:hover{color:var(--purple);}
.tab-bar a.active{color:var(--purple);border-bottom-color:var(--purple);}

/* Quiz Layout */
.quiz-wrap{max-width:760px;margin:32px auto;padding:0 24px 80px;}

/* Score bar */
.score-bar{background:white;border-radius:10px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);flex-wrap:wrap;}
.score-bar .counter{font-size:15px;color:var(--text-light);}
.score-bar .counter b{color:var(--purple);font-size:17px;}
.score-bar .progress-wrap{flex:1;min-width:120px;}
.progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--purple);border-radius:4px;transition:width .4s;}
.score-badge{display:flex;gap:12px;margin-left:auto;}
.score-badge span{font-size:13px;font-weight:700;padding:4px 10px;border-radius:20px;}
.score-badge .correct{background:var(--green-pale);color:var(--green);}
.score-badge .wrong{background:var(--red-pale);color:var(--red);}

/* Mode selector */
.mode-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.mode-btn{padding:7px 16px;border-radius:20px;border:2px solid var(--border);background:white;font-size:13px;font-weight:600;color:var(--text-light);cursor:pointer;transition:all .15s;}
.mode-btn:hover{border-color:var(--purple-light);color:var(--purple);}
.mode-btn.active{border-color:var(--purple);background:var(--purple);color:white;}

/* Question card */
.q-card{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;margin-bottom:20px;}
.q-header{background:var(--purple);color:white;padding:12px 20px;display:flex;align-items:center;gap:10px;}
.q-header .q-num{font-size:13px;opacity:.85;}
.q-header .q-tag{background:rgba(255,255,255,.2);font-size:11px;padding:2px 8px;border-radius:10px;}
.q-body{padding:20px 24px;}
/* 지시문 */
.q-instruction{font-size:14px;line-height:1.7;color:var(--text-light);margin-bottom:12px;}
/* 지문 박스 */
.q-scenario{background:#fafafa;border:1px solid #e0d9ec;border-radius:8px;padding:4px 0;margin-bottom:20px;}
.q-scenario-item{display:flex;gap:10px;align-items:baseline;padding:10px 16px;border-bottom:1px solid #ede8f5;font-size:14px;line-height:1.75;color:var(--text);}
.q-scenario-item:last-child{border-bottom:none;}
.q-scenario-item .snum{min-width:20px;font-weight:700;color:var(--purple);font-size:13px;}
/* 지문 없는 단순 질문 */
.q-text-only{font-size:15px;line-height:1.8;color:var(--text);margin-bottom:20px;font-weight:600;}

/* Choices */
.choices{display:flex;flex-direction:column;gap:8px;}
.choice{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;font-size:14px;line-height:1.6;}
.choice:hover:not(.disabled){border-color:var(--purple-light);background:var(--purple-pale);}
.choice .num{width:26px;height:26px;min-width:26px;border-radius:50%;background:var(--gray-bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--text-light);margin-top:1px;}
.choice.selected{border-color:var(--purple);background:var(--purple-pale);}
.choice.selected .num{background:var(--purple);color:white;}
.choice.correct{border-color:var(--green);background:var(--green-pale);}
.choice.correct .num{background:var(--green);color:white;}
.choice.wrong{border-color:var(--red);background:var(--red-pale);}
.choice.wrong .num{background:var(--red);color:white;}
.choice.disabled{cursor:default;}
.choice.show-correct{border-color:var(--green);background:var(--green-pale);}
.choice.show-correct .num{background:var(--green);color:white;}

/* Result area */
.result-area{margin-top:16px;padding:14px 16px;border-radius:8px;font-size:14px;line-height:1.7;display:none;}
.result-area.correct{background:var(--green-pale);border:1px solid #a5d6a7;color:var(--green);}
.result-area.wrong{background:var(--red-pale);border:1px solid #ef9a9a;color:var(--red);}
.result-area .ans-text{font-weight:700;margin-bottom:4px;font-size:15px;}
.result-area .criteria{margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,.08);font-size:13px;color:var(--text-light);}

/* Navigation */
.nav-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.nav-btn{padding:10px 24px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
.nav-btn.primary{background:var(--purple);color:white;}
.nav-btn.primary:hover{background:var(--purple-light);}
.nav-btn.secondary{background:white;color:var(--text);border:2px solid var(--border);}
.nav-btn.secondary:hover{border-color:var(--purple-light);color:var(--purple);}
.nav-btn:disabled{opacity:.4;cursor:not-allowed;}
.nav-center{display:flex;gap:8px;}

/* Result screen */
.result-screen{background:white;border-radius:12px;padding:40px 32px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08);display:none;}
.result-screen h2{font-size:24px;color:var(--purple);margin-bottom:8px;}
.result-screen .score-big{font-size:56px;font-weight:900;color:var(--purple);margin:20px 0;line-height:1;}
.result-screen .score-big span{font-size:22px;color:var(--text-light);}
.result-screen .details{display:flex;justify-content:center;gap:32px;margin-bottom:28px;font-size:15px;}
.result-screen .details .c{color:var(--green);font-weight:700;}
.result-screen .details .w{color:var(--red);font-weight:700;}

/* Quick jump */
.jump-row{display:flex;align-items:center;gap:8px;}
.jump-input{width:70px;padding:7px 10px;border:2px solid var(--border);border-radius:6px;font-size:14px;text-align:center;}
.jump-input:focus{outline:none;border-color:var(--purple);}

/* Shuffle badge */
.shuffle-badge{font-size:11px;background:var(--purple-pale);color:var(--purple);padding:3px 8px;border-radius:10px;font-weight:600;}
/* Score badge clickable */
.score-badge span{cursor:pointer;transition:all .15s;}
.score-badge span:hover{opacity:.8;transform:scale(1.05);}
.score-badge span.active-badge{outline:2px solid currentColor;outline-offset:2px;}
/* Review panel */
.review-panel{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:20px;overflow:hidden;display:none;}
.review-panel-header{background:var(--purple);color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.review-panel-header h3{font-size:14px;font-weight:700;}
.review-panel-close{background:none;border:none;color:white;font-size:18px;cursor:pointer;padding:0 2px;line-height:1;}
/* Accordion items */
.rv-item{border-bottom:1px solid #f0ecf8;}
.rv-item:last-child{border-bottom:none;}
.rv-summary{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;transition:background .12s;user-select:none;}
.rv-summary:hover{background:var(--purple-pale);}
.rv-summary .rv-arrow{font-size:11px;color:var(--purple);min-width:12px;transition:transform .2s;}
.rv-item.open .rv-arrow{transform:rotate(90deg);}
.rv-summary .rv-num{font-size:12px;font-weight:700;color:var(--text-light);min-width:44px;}
.rv-summary .rv-preview{font-size:13px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rv-summary .rv-tag{font-size:11px;background:var(--purple-pale);color:var(--purple);padding:2px 7px;border-radius:10px;white-space:nowrap;}
/* Accordion detail */
.rv-detail{display:none;padding:0 20px 16px 46px;}
.rv-item.open .rv-detail{display:block;}
.rv-detail .rv-instruction{font-size:13px;color:var(--text-light);margin-bottom:8px;line-height:1.6;}
.rv-detail .rv-scenario{background:#fafafa;border:1px solid #e0d9ec;border-radius:6px;margin-bottom:12px;}
.rv-detail .rv-sc-item{display:flex;gap:8px;padding:8px 12px;border-bottom:1px solid #ede8f5;font-size:13px;line-height:1.6;}
.rv-detail .rv-sc-item:last-child{border-bottom:none;}
.rv-detail .rv-sc-num{font-weight:700;color:var(--purple);min-width:18px;}
.rv-detail .rv-choices{display:flex;flex-direction:column;gap:6px;}
.rv-detail .rv-choice{display:flex;gap:8px;padding:8px 12px;border-radius:6px;font-size:13px;line-height:1.5;border:1.5px solid var(--border);}
.rv-detail .rv-choice.rv-correct{background:var(--green-pale);border-color:var(--green);}
.rv-detail .rv-choice.rv-wrong{background:var(--red-pale);border-color:var(--red);}
.rv-detail .rv-choice .rv-cnum{font-weight:700;min-width:20px;}
.rv-detail .rv-choice.rv-correct .rv-cnum{color:var(--green);}
.rv-detail .rv-choice.rv-wrong .rv-cnum{color:var(--red);}
.rv-empty{padding:28px;text-align:center;color:var(--text-light);font-size:14px;}
</style>
</head>
<body>
<header>
  <div class="logo">ISMS-P</div>
  <h1>정보보호 및 개인정보보호 관리체계 인증기준</h1>
</header>
<nav class="tab-bar">
  <a href="index.html">📋 인증기준 안내서</a>
  <a href="amgi_page.html">📝 주요 암기사항</a>
  <a href="puri_page.html">💡 인증 기준 풀이</a>
  <a href="quiz_page.html" class="active">📚 문제풀이</a>
</nav>

<div class="quiz-wrap">
  <!-- Score bar -->
  <div class="score-bar">
    <div class="counter">문제 <b id="cur-num">1</b> / <b id="total-num">0</b></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="score-badge">
      <span class="correct" onclick="openReview('correct')">정답 <span id="score-correct">0</span></span>
      <span class="wrong" onclick="openReview('wrong')">오답 <span id="score-wrong">0</span></span>
    </div>
  </div>

  <!-- Review panel -->
  <div class="review-panel" id="review-panel">
    <div class="review-panel-header">
      <h3 id="review-title">문제 목록</h3>
      <button class="review-panel-close" onclick="closeReview()">✕</button>
    </div>
    <div id="review-body"></div>
  </div>

  <!-- Mode bar -->
  <div class="mode-bar">
    <button class="mode-btn active" id="btn-seq" onclick="setMode('seq')">순서대로</button>
    <button class="mode-btn" id="btn-shuffle" onclick="setMode('shuffle')">랜덤 풀기</button>
    <button class="mode-btn" id="btn-wrong" onclick="setMode('wrong')">오답 복습</button>
    <span class="shuffle-badge" id="mode-label" style="display:none"></span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
      <button class="nav-btn secondary" style="padding:7px 14px;font-size:13px;" onclick="resetQuiz()">처음부터</button>
    </div>
  </div>

  <!-- Question card -->
  <div class="q-card" id="q-card">
    <div class="q-header">
      <span class="q-num" id="q-num-label">문제 1</span>
      <span class="q-tag" id="q-tag"></span>
    </div>
    <div class="q-body">
      <div class="q-text" id="q-text"></div>
      <div class="choices" id="choices"></div>
      <div class="result-area" id="result-area">
        <div class="ans-text" id="ans-text"></div>
        <div class="criteria" id="criteria-text"></div>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav-row">
    <button class="nav-btn secondary" id="btn-prev" onclick="goTo(currentIdx-1)">◀ 이전</button>
    <div class="nav-center">
      <div class="jump-row">
        <input class="jump-input" id="jump-input" type="number" min="1" placeholder="번호" onkeydown="if(event.key==='Enter')jumpTo()">
        <button class="nav-btn secondary" style="padding:7px 14px;font-size:13px;" onclick="jumpTo()">이동</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="nav-btn primary" id="btn-confirm" onclick="confirmAction()">정답 확인</button>
      <button class="nav-btn secondary" id="btn-next" onclick="nextAction()" style="display:none;">다음 ▶</button>
    </div>
  </div>

  <!-- Result screen (shown at end) -->
  <div class="result-screen" id="result-screen">
    <h2>🎉 퀴즈 완료!</h2>
    <div class="score-big" id="final-score">0<span>점</span></div>
    <div class="details">
      <div>총 문제: <b id="fin-total">0</b>개</div>
      <div class="c">정답: <b id="fin-correct">0</b>개</div>
      <div class="w">오답: <b id="fin-wrong">0</b>개</div>
    </div>
    <button class="nav-btn primary" style="padding:12px 32px;font-size:15px;" onclick="resetQuiz()">다시 풀기</button>
    <button class="nav-btn secondary" style="padding:12px 32px;font-size:15px;margin-left:12px;" onclick="reviewWrong()">오답 복습</button>
  </div>

<script>

let questions = [...ALL_QUESTIONS];
let currentIdx = 0;
let answered = {};  // idx -> selected choice num
let correct = 0;
let wrong = 0;
let mode = 'seq';
// selections: origIdx -> Set of choice nums (pre-confirmation staging)
let selections = {};

const CIRCLE = ['①','②','③','④','⑤'];

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  const sa = [...a].sort((x,y)=>x-y);
  const sb = [...b].sort((x,y)=>x-y);
  return sa.every((v,i) => v === sb[i]);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  const lbl = document.getElementById('mode-label');
  if (m === 'seq') {
    document.getElementById('btn-seq').classList.add('active');
    questions = [...ALL_QUESTIONS];
    lbl.style.display = 'none';
  } else if (m === 'shuffle') {
    document.getElementById('btn-shuffle').classList.add('active');
    questions = [...ALL_QUESTIONS].sort(() => Math.random() - 0.5);
    lbl.textContent = '🔀 랜덤';
    lbl.style.display = '';
  } else if (m === 'wrong') {
    document.getElementById('btn-wrong').classList.add('active');
    const wrongOrig = Object.entries(answered)
      .filter(([i,v]) => v !== null && v !== undefined && !arraysEqual(ALL_QUESTIONS[i].answers, v))
      .map(([i]) => ALL_QUESTIONS[i]);
    questions = wrongOrig.length ? wrongOrig : [...ALL_QUESTIONS];
    lbl.textContent = wrongOrig.length ? `오답 ${wrongOrig.length}개` : '오답 없음 (전체)';
    lbl.style.display = '';
  }
  resetQuiz(false);
}

function resetQuiz(resetAnswered=true) {
  if (resetAnswered) {
    answered = {};
    selections = {};
    correct = 0;
    wrong = 0;
    updateScore();
  }
  currentIdx = 0;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('q-card').style.display = '';
  document.querySelector('.nav-row').style.display = '';
  render(0);
}

  document.getElementById('cur-num').textContent = idx+1;
  document.getElementById('total-num').textContent = questions.length;
  document.getElementById('prog-fill').style.width = `${Math.round((idx+1)/questions.length*100)}%`;

    // 지문 없는 단순 질문
    const p = document.createElement('p');
    p.className = 'q-text-only';
    p.textContent = qLines[0] || q.question;
    qTextEl.appendChild(p);
  } else {
    // 첫 줄 = 지시문
    const inst = document.createElement('p');
    inst.className = 'q-instruction';
    inst.textContent = qLines[0];

    // 나머지 줄 = 지문 항목들
    const scenario = document.createElement('div');
    scenario.className = 'q-scenario';
    qLines.slice(1).forEach((line, i) => {
      const item = document.createElement('div');
      item.className = 'q-scenario-item';
      item.innerHTML = `<span class="snum">${i+1}.</span><span>${line}</span>`;
      scenario.appendChild(item);
    });
    qTextEl.appendChild(scenario);
  }

  // state
  const origIdx = ALL_QUESTIONS.indexOf(q);
  const committedAnswer = origIdx >= 0 ? answered[origIdx] : undefined; // Array or null or undefined
  const isCommitted = committedAnswer !== undefined;
  const sel = (origIdx >= 0 && selections[origIdx]) ? selections[origIdx] : new Set();

  // choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  q.choices.forEach(c => {
    const div = document.createElement('div');
    div.className = 'choice';
    if (isCommitted) {
      div.classList.add('disabled');
      if (committedAnswer !== null) {
        const isCorrect = q.answers.includes(c.num);
        const wasSelected = committedAnswer.includes(c.num);
        if (wasSelected && isCorrect)   div.classList.add('correct');

      div.addEventListener('click', () => toggleSelection(idx, c.num, q));
    }
    div.innerHTML = `<div class="num">${CIRCLE[c.num-1] || c.num}</div><div>${c.text}</div>`;
    choicesEl.appendChild(div);
  });

  // result area
  const resultEl = document.getElementById('result-area');
  if (isCommitted) {
    let isRight = false;
    let ansText = '';
    if (committedAnswer === null) {
      ansText = `⏭ 건너뜀. 정답: ${q.answers.map(a=>CIRCLE[a-1]).join(', ')}`;
      resultEl.className = 'result-area wrong';
    } else {
      isRight = arraysEqual(committedAnswer, q.answers);
      if (isRight) {
        ansText = '✅ 정답입니다!';
        resultEl.className = 'result-area correct';
      } else {
        ansText = `❌ 오답입니다. 정답: ${q.answers.map(a=>CIRCLE[a-1]).join(', ')}`;
        resultEl.className = 'result-area wrong';
      }
    }
    resultEl.style.display = '';
    document.getElementById('ans-text').textContent = ansText;
    const crit = q.criteria && q.criteria.length
      ? q.criteria.map(c => c.item ? `[인증기준 ${c.item}] ${c.criteria||''}` : '').filter(Boolean).join(' | ')
      : '';
    document.getElementById('criteria-text').textContent = crit;
    document.getElementById('criteria-text').style.display = crit ? '' : 'none';
  } else {
    resultEl.style.display = 'none';
  }

  // nav buttons
  document.getElementById('btn-prev').disabled = idx === 0;
  const confirmBtn = document.getElementById('btn-confirm');
  const nextBtn = document.getElementById('btn-next');
  confirmBtn.style.display = '';
  nextBtn.style.display = '';
  confirmBtn.textContent = sel.size > 0 ? '정답 확인 ✓' : '정답 확인';
  confirmBtn.disabled = isCommitted;
  nextBtn.textContent = idx === questions.length-1 ? '결과 보기' : '다음 ▶';
  nextBtn.disabled = !isCommitted;

  // jump input
  document.getElementById('jump-input').value = '';
  document.getElementById('jump-input').placeholder = `1~${questions.length}`;
}

function toggleSelection(idx, choiceNum, q) {
  const origIdx = ALL_QUESTIONS.indexOf(q);
  if (origIdx < 0) return;
  if (answered[origIdx] !== undefined) return;
  if (!selections[origIdx]) selections[origIdx] = new Set();
  const sel = selections[origIdx];
  if (sel.has(choiceNum)) sel.delete(choiceNum);
  else sel.add(choiceNum);
  render(idx);
}

let reviewType = null;
function openReview(type) {
  // 같은 버튼 다시 누르면 토글 닫기
  if (reviewType === type) { closeReview(); return; }
  reviewType = type;
  const isCorrect = type === 'correct';

  // 뱃지 강조
  document.querySelectorAll('.score-badge span').forEach(s => s.classList.remove('active-badge'));
  document.querySelector('.score-badge .' + type).classList.add('active-badge');

  const items = [];
  Object.entries(answered).forEach(([i, v]) => {
    const q = ALL_QUESTIONS[parseInt(i)];
    if (!q || v === null || v === undefined) return;
    const right = arraysEqual(v, q.answers);
    if (isCorrect ? right : !right) items.push({q, origIdx: parseInt(i)});
  });

  document.getElementById('review-title').textContent =
    isCorrect ? `✅ 정답 문제 (${items.length}개)` : `❌ 오답 문제 (${items.length}개)`;

  const body = document.getElementById('review-body');
  body.innerHTML = '';

  if (!items.length) {
    body.innerHTML = '<div class="rv-empty">해당 문제가 없습니다.</div>';
  } else {
    items.forEach(({q, origIdx}) => {
      const qNum = questions.indexOf(q);
      const displayNum = qNum >= 0 ? qNum + 1 : origIdx + 1;
      const lines = q.question.split('\n').map(l => l.trim()).filter(Boolean);
      const instruction = lines[0] || '';
      const scenarioLines = lines.slice(1);
      const userAns = answered[origIdx] || [];
      const tag = q.criteria && q.criteria[0] ? q.criteria[0].item || '' : '';

      // 아이템 컨테이너
      const item = document.createElement('div');
      item.className = 'rv-item';

      // 요약 행 (클릭으로 토글)
      const summary = document.createElement('div');
      summary.className = 'rv-summary';
      const preview = instruction.length > 55 ? instruction.slice(0, 55) + '…' : instruction;
      summary.innerHTML =
        `<span class="rv-arrow">▶</span>` +
        `<span class="rv-num">문제 ${displayNum}</span>` +
        `<span class="rv-preview">${preview}</span>` +
        (tag ? `<span class="rv-tag">${tag}</span>` : '');
      summary.addEventListener('click', () => {
        item.classList.toggle('open');
      });

      // 상세 내용
      const detail = document.createElement('div');
      detail.className = 'rv-detail';

      // 지시문
      if (instruction) {
        const inst = document.createElement('p');
        inst.className = 'rv-instruction';
        inst.textContent = instruction;
        detail.appendChild(inst);
      }

      // 지문 박스
      if (scenarioLines.length) {
        const sc = document.createElement('div');
        sc.className = 'rv-scenario';
        scenarioLines.forEach((line, si) => {
          const row = document.createElement('div');
          row.className = 'rv-sc-item';
          row.innerHTML = `<span class="rv-sc-num">${si+1}.</span><span>${line}</span>`;
          sc.appendChild(row);
        });
        detail.appendChild(sc);
      }

      // 선택지 (정답/오답 표시)
      const choices = document.createElement('div');
      choices.className = 'rv-choices';
      q.choices.forEach(c => {
        const row = document.createElement('div');
        const isCorrectChoice = q.answers.includes(c.num);
        const wasSelected = userAns.includes(c.num);
        row.className = 'rv-choice' +
          (isCorrectChoice ? ' rv-correct' : (wasSelected ? ' rv-wrong' : ''));
        row.innerHTML = `<span class="rv-cnum">${CIRCLE[c.num-1]}</span><span>${c.text}</span>`;
        choices.appendChild(row);
      });
      detail.appendChild(choices);

      item.appendChild(summary);
      item.appendChild(detail);
      body.appendChild(item);
    });
  }

  const panel = document.getElementById('review-panel');
  panel.style.display = 'block';
  panel.scrollIntoView({behavior:'smooth', block:'start'});
}

function closeReview() {
  reviewType = null;
  document.getElementById('review-panel').style.display = 'none';
  document.querySelectorAll('.score-badge span').forEach(s => s.classList.remove('active-badge'));
}

function commitAnswer(idx, q) {
  const origIdx = ALL_QUESTIONS.indexOf(q);
  if (origIdx < 0) return;
  if (answered[origIdx] !== undefined) return;

  const sel = selections[origIdx] ? [...selections[origIdx]] : [];
  if (sel.length === 0) {
    // skip
    answered[origIdx] = null;
  } else {
    answered[origIdx] = sel;
    if (arraysEqual(sel, q.answers)) correct++;
    else wrong++;
    updateScore();
  }
  render(idx);
}

function confirmAction() {
  const q = questions[currentIdx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  const isCommitted = origIdx >= 0 && answered[origIdx] !== undefined;
  if (!isCommitted) commitAnswer(currentIdx, q);
}

function nextAction() {
  if (currentIdx === questions.length - 1) {
    showResult();
  } else {
    goTo(currentIdx + 1);
  }
}

function goTo(idx) {
  if (idx < 0 || idx >= questions.length) return;
  render(idx);
  window.scrollTo({top:0, behavior:'smooth'});
}

function jumpTo() {
  const v = parseInt(document.getElementById('jump-input').value);
  if (v >= 1 && v <= questions.length) goTo(v-1);
}

function updateScore() {
  document.getElementById('score-correct').textContent = correct;
  document.getElementById('score-wrong').textContent = wrong;
}

function showResult() {
  const vals = Object.values(answered);
  const total = vals.filter(v => v !== undefined).length;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  document.getElementById('final-score').innerHTML = `${pct}<span>점</span>`;
  document.getElementById('fin-total').textContent = total;
  document.getElementById('fin-correct').textContent = correct;
  document.getElementById('fin-wrong').textContent = wrong;
  document.getElementById('result-screen').style.display = '';
  document.getElementById('q-card').style.display = 'none';
  document.querySelector('.nav-row').style.display = 'none';
  window.scrollTo({top:0, behavior:'smooth'});
}

function reviewWrong() {
  setMode('wrong');
}

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const q = questions[currentIdx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  const isCommitted = origIdx >= 0 && answered[origIdx] !== undefined;

  if (e.key === 'ArrowRight' || e.key === 'Enter') {
    if (isCommitted) nextAction(); else confirmAction();
  }
  if (e.key === 'ArrowLeft' && isCommitted) goTo(currentIdx-1);
  if (!isCommitted && e.key >= '1' && e.key <= '5') {
    const num = parseInt(e.key);
    if (q.choices.find(c => c.num === num)) toggleSelection(currentIdx, num, q);
  }
});

// Init
render(0);
</script>
</body>
</html>
